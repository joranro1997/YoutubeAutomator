      tag_seeds: ["legend of elements", "loe", "loe guide", "loe event", "loe build", "loe update", "idle rpg"]
      # The "Legend of Elements" playlist on @MidwayPaladin.
      playlist_id: "PLaOsYl1k0WopSpD1I7ytYZUWlx2HRI4Nr"
    # Phase 3 — Premiere template profile. Derived from a describe-dump of the
    # real loe.prproj (sequence "2023-03-23 20-59-52", 14 V / 7 A tracks).
    # NOTE: LoE is simpler than LoM — NO promo, so overlay tracks are single
    # full-length clips. Audio routing is REVERSED vs LoM: gameplay -> A2,
    # music -> A1.
    premiere_template:
      template_filename: "loe.prproj"
      sequence_name: "2023-03-23 20-59-52"
      content_video_track: "V7"          # recorded gameplay (no promo)
      gameplay_audio_track: "A2"         # mirrors V7 (voice-over)
      music_track: "A1"                  # videoplayback.mp3 (continuous)
      static_decor_video_tracks: ["V1", "V2", "V3", "V4", "V5", "V6"]  # stretch to total (V2 hidden but still stretched for clean timeline)
      overlay_tracks: ["V8", "V10", "V11"]                       # 1 clip (no promo)
      fixed_intro_video_tracks: ["V9"]   # like/sub/bell — untouched
      fixed_intro_audio_tracks: ["A3"]
      ignore_video_tracks: ["V12", "V13", "V14"]                  # only meta tracks
      ignore_audio_tracks: ["A4", "A5", "A6", "A7"]
      promo:
        present: false
        asset_filename: ""               # no pre-recorded LoE promo yet
      silence:
        threshold_db: -35.0
        min_silence_sec: 0.4
        keep_margin_sec: 0.12
        min_keep_sec: 0.30
