# Per-game configuration. Add a new entry to onboard another title.
# Channel-wide defaults live in settings.yaml.

games:
  legend_of_mushroom:
    display_name: "Legend of Mushroom"
    slug: "lom"
    sources:
      reddit:
        subreddits: ["LegendOfMushroomGame"]
        top_limit: 25
        new_limit: 50
      discord:
        # Upstream reference (not read directly — see mirror_channels below).
        guilds:
          - guild_id: "1196745368793264128"
            label: "Legend of Mushroom Official"
            channel_ids:
              - "1232935706222006282"   # creators-announce  (NOT followable — manual)
              - "1196745369330122774"   # announcements
              - "1196767045602250752"   # game-updates
              - "1217058549872721930"   # gift-codes
          - guild_id: "1167416560672063498"
            label: "Aptoide Official"
            channel_ids:
              - "1258809408096567416"   # announcements (cross-game)
              - "1247967780133802054"   # promotions
              - "1219362645061271683"   # lom-game-announcements
              - "1247979106772062251"   # lom-leaks
        # Channels in the user's own server (714631239507902496) where the
        # upstream Announcement channels are mirrored via Discord's Follow.
        # The bot has Read Message History on these.
        mirror_channels:
          - channel_id: "1504373455674544240"
            label: "lom-scrapping (mirror of LoM Official)"
            fetch_limit: 50
          - channel_id: "1504373943480488046"
            label: "aptoide-scrapping (mirror of Aptoide Official)"
            fetch_limit: 50
      web:
        # No official patch-notes web pages exist for these games — all
        # update info lives in the game's Discord. Kept for future use.
        patch_notes_urls: []
        wiki_root: ""
      youtube:
        # Search queries used to discover trending/recent videos about the
        # game on YouTube. Useful for "what's hot right now" signal.
        search_queries:
          - "legend of mushroom"
          - "legend of mushroom update"
          - "legend of mushroom event"
          - "legend of mushroom guide"
          - "legend of mushroom new gacha"
        # How many results per query, and how old at most (days).
        results_per_query: 15
        max_age_days: 30
    sponsorship:
      affiliate_code: "MIDWAY"
      mention_required: true
      ad_segment_path: ""     # Windows-only; fill on the PC
      description_template_id: "default_lom"
      download_link: "http://aptoi.de/MidwayLoM"
      browser_play_link: "http://aptoi.de/all-platforms-LoM"
      promo_video_url: "https://youtu.be/-mDBRNi_Vkc"
    youtube:
      default_category_id: "20"   # Gaming
      default_language: "en"
      default_audience: "no"      # "yes" = made for kids; "no" otherwise
      tag_seeds: ["legend of mushroom", "lom", "mushroom rpg", "lom guide", "lom event", "lom update", "idle rpg"]
      # The "Legend of Mushroom" playlist on @MidwayPaladin.
      playlist_id: "PLaOsYl1k0WooTv_NWgrHH3Bw25i_7kMTb"
    # Phase 3 — Premiere template profile. Derived from a describe-dump of the
    # real lom.prproj (sequence "2023-03-23 20-59-52", 14 V / 8 A tracks).
    # NOTE: LoM routes gameplay audio to A1 and music to A2 (LoE is reversed).
    premiere_template:
      # Rebuild operates on the nest-migrated copy (V7 = GAMEPLAY_NEST clip
      # carrying the 3 tuned Ultra Keys). The promo block GEOMETRY is still
      # read from the original pre-nest describe-dump (data/tmp/lom_describe
      # .json) — a fixed property captured once, independent of this file.
      template_filename: "lom_nest.prproj"
      sequence_name: "2023-03-23 20-59-52"
      content_video_track: "V7"          # recorded gameplay + promo block
      gameplay_audio_track: "A1"         # mirrors V7 (voice-over)
      music_track: "A2"                  # videoplayback.mp3 (continuous)
      static_decor_video_tracks: ["V1", "V2", "V3", "V4", "V5", "V6"]  # stretch to total (V2 hidden but still stretched for clean timeline)
      overlay_tracks: ["V8", "V10", "V11"]                       # 3-phase (promo)
      fixed_intro_video_tracks: ["V9"]   # like/sub/bell — untouched
      fixed_intro_audio_tracks: ["A3"]
      ignore_video_tracks: ["V12", "V13", "V14"]                  # only meta tracks
      ignore_audio_tracks: ["A4", "A5", "A6", "A7", "A8"]
      promo:
        present: true
        clip_name_contains: "PROMO"
        asset_filename: "lom.mp4"        # assets/aptoide_ads/lom.mp4
        target_offset_sec: 67.0          # ~60-75s (ref video was 74s)
        snap: "silence"                  # split at nearest natural pause
      silence:
        threshold_db: -35.0
        min_silence_sec: 0.4
        keep_margin_sec: 0.12
        min_keep_sec: 0.30

