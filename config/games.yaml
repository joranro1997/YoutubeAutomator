              - "1404384713023553628"   # elements-announce
              - "1410450835426640014"   # elements-patch-notes
              - "1410457690345570385"   # gift-codes
              - "1437406069675659365"   # dev-feedback  (NOT followable — manual)
              - "1451388679481462965"   # discord-events  (NOT followable — manual)
          - guild_id: "1167416560672063498"
            label: "Aptoide Official"
            channel_ids:
              - "1258809408096567416"   # announcements (cross-game)
              - "1247967780133802054"   # promotions
        mirror_channels:
          - channel_id: "1504373915391230092"
            label: "loe-scrapping (mirror of LoE Official)"
