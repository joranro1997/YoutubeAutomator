# Default hashtag lines per game (override per-video if a topic needs special tags).
hashtag_lines:
  default_lom: "#LoM #LegendOfMushroom #MobileGaming #GachaGame #MobileRPG"
  default_loe: "#LegendOfElements #LegendOfMushroom #IdleRPG"
  default_dsv: "#DuckSurvival #MobileGaming #SurvivalGame #MobileRPG"

# Contractual must-haves enforced by the pipeline (do not bypass).
# Reference: Aptoide Connect Affiliate Agreement §4 + Appendix 1.
contract_guardrails:
  description_must_contain:
    - "{affiliate_code}"
    - "Aptoide"
  description_must_not_contain:
    # §4.11: never present Aptoide as a place for free paid apps.
    # NOTE: phrases like "No Aptoide" or "no downloads, no Aptoide" are FINE —
    # they refer to the browser-play promotion explicitly approved by Aptoide
    # (instant play via URL without installing the Aptoide app/emulator).
    - "paid apps free"
    - "free paid apps"
    - "cracked apps"
  script_must_mention_aptoide_at_least: 1
  # §4.5: ground facts in verified sources
  require_source_citation_for_factual_claims: true
