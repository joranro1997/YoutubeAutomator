# Channel-wide settings. Per-game overrides live in games.yaml.

channel:
  language: "en"
  # Channel is @MidwayPaladin — high-energy English gaming voice with strong
  # hooks (titles regularly use "INSANE", "MASSIVE", "CRAZY", "BROKEN", etc.).
  # The style corpus (built from transcripts) is the authoritative source —
  # this string is just a fallback hint when no corpus is loaded yet.
  voice_style: "high-energy English, hooky, casual, gamer-friendly"
  # Path (under data/corpus/transcripts/) where the user's prior-video transcripts live.
  # Used as style corpus for script generation (RAG).
  style_corpus_dir: "data/corpus/transcripts"
  creator_handle: "@MidwayPaladin"
  creator_bio: |
    Hey! I'm a 29-year-old gamer from Spain who's been passionate about gaming
    since the age of 13. I started out by sharing raid boss kills in World of
    Warcraft, and now I love creating content and sharing gaming adventures
    with you. Thanks for being part of this incredible journey!
  links:
    twitch: "https://www.twitch.tv/midwayeu"
    twitter: "https://twitter.com/MidwayPaladin"
    discord: "https://discord.gg/EZzq6V9pkJ"

llm:
  # Model selection per task. Override via env if needed.
  models:
    research_summarize: "claude-sonnet-4-6"
    topic_selection: "claude-opus-4-6"
    script_generation: "claude-opus-4-6"
    metadata_generation: "claude-sonnet-4-6"
  max_tokens_default: 4096

pipeline:
  videos_per_week_target: 2          # per game, per contract
  approval_required: false           # Aptoide does not gate in practice
  human_in_the_loop_topic: true      # user picks topic from candidates
  human_in_the_loop_script: true     # user approves/edits generated script
  human_in_the_loop_metadata: true   # user picks among title/thumbnail variants

# Description templates mirror the user's real, in-use video descriptions.
# Placeholders are filled by metadata/generator.py:
#   {affiliate_code}        e.g. MIDWAY / MIDLOE
