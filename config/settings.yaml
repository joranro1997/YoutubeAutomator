#   {browser_play_link}     e.g. http://aptoi.de/all-platforms-LoM ('' for LoE)
#   {promo_video_url}       evergreen "how to use my Aptoide code" video
#   {game_official_discord} https://discord.gg/... for the game
#   {hook}                  1-3 sentence topic blurb produced per-video
#   {creator_twitch} {creator_twitter} {creator_discord}
#   {creator_bio}
#   {hashtags}              per-game hashtag line
